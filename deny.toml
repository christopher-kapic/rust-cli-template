# cargo-deny configuration — supply-chain guardrails enforced in CI.
# Run locally with: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[advisories]
# Fail on any crate with a known RUSTSEC security advisory.
version = 2
yanked = "deny"
# Add IDs here only with a written justification, e.g.:
# ignore = ["RUSTSEC-0000-0000"]  # reason: <why this is acceptable>
ignore = []

[licenses]
version = 2
# Allowlist of licenses your dependency tree may use. If a new dependency pulls
# in a license not listed here, CI fails — forcing a conscious decision rather
# than an accidental GPL/AGPL inclusion. Add licenses deliberately.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
]
confidence-threshold = 0.9

[bans]
# Warn when multiple versions of the same crate are pulled in (bloat / slow
# builds). Not an error by default — bump to "deny" once your tree is clean.
multiple-versions = "warn"
wildcards = "deny"
# Crates you never want, with a reason:
# deny = [{ crate = "openssl", reason = "use rustls instead" }]
deny = []

[sources]
# Only allow crates from crates.io by default. Add git sources explicitly.
unknown-registry = "deny"
unknown-git = "deny"
